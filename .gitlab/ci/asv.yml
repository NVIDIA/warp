# ==============================================================================
# ASV Benchmarking Child Pipeline
#
# Runs Warp's airspeed velocity (ASV) benchmark suite on an L40 GPU host.
#
# Structure:
#   - `linux-x86_64 asv build` (stage: build): compiles wheels for the MR
#     target ref and the current commit on a CPU runner so the GPU host
#     doesn't burn L40 booking time on builds. Wheels are shipped to the
#     bench jobs via the `_wheels/` artifact.
#   - `linux-x86_64 asv non-tile` (stage: test): always runs once this
#     pipeline is triggered.
#   - `linux-x86_64 asv tile` (stage: test): heavier than the rest of the
#     suite combined; auto-runs only on tile-relevant changes, otherwise
#     available as a manual play button.
#
# This pipeline is triggered by the `asv benchmarks` job in /.gitlab-ci.yml,
# which gates on the broad set of paths that could affect any benchmark.
# It is not run directly.
# ==============================================================================

include:
  - /.gitlab/ci/common.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"

stages:
  - build
  - test

# Build Warp wheels for COMPARE_REF and CI_COMMIT_SHA on a CPU runner so
# the GPU-bound asv bench jobs don't spend L40 booking time compiling.
# Wheels are written to asv's native build cache; the bench jobs skip
# build_command and go straight to install_command using the cached wheels.
linux-x86_64 asv build:
  stage: build
  needs: []
  image: $WARP_BUILDER_IMAGE_CU12
  extends:
    - .ipp_lnx_x86_64_cpu_medium
  variables:
    IPP_RUNNER_EXECUTION_DURATION: "3600"
    GIT_DEPTH: "50"
    CUDA_HOME: "/usr/local/cuda"
  before_script:
    - !reference [.snippets, section-start-install-deps]
    - df -h
    # Remove /shared/local/bin from PATH - contains musl-linked binaries from the ephemeral
    # runner (v1.5.1+) that are incompatible with this glibc-based container
    - export PATH=$(echo "$PATH" | sed 's|:/shared/local/bin||g; s|/shared/local/bin:||g')
    - curl -LsSf https://astral.sh/uv/install.sh | env UV_UNMANAGED_INSTALL="$CI_PROJECT_DIR/_uv" sh
    - export PATH="$CI_PROJECT_DIR/_uv/bin:$PATH"
    - uv python install $UV_PYTHON
    - COMPARE_REF="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}}"
    - 'echo "COMPARE_REF value: ${COMPARE_REF}"'
    - git config --global --add safe.directory $CI_PROJECT_DIR
    # Make sure the comparison ref can be checked out by asv
    - git fetch origin $COMPARE_REF
    - git checkout -f $COMPARE_REF
    - git checkout -f $CI_COMMIT_SHA
    - !reference [.snippets, section-end-install-deps]
  script:
    - uvx asv machine --machine asv-build --yes
    # asv has no `build` subcommand; `continuous --quick` builds both refs
    # (populating asv/env/*/asv-build-cache/) and runs a tiny PythonBuiltins
    # sanity benchmark. rc==1 means "regression detected" (asv's normal exit
    # for continuous), so only fail on rc>1 which signals a real error.
    - 'date -u +"asv continuous --quick start: %FT%TZ"'
    - rc=0; uvx asv continuous -v --quick -b PythonBuiltins $COMPARE_REF $CI_COMMIT_SHA || rc=$?; if [ $rc -gt 1 ]; then exit $rc; fi
    - 'date -u +"asv continuous --quick end:   %FT%TZ"'
    # Relocate built wheels to a flat `_wheels/` path for the bench job. asv's
    # own cache lives inside the env directory, which Environment.create()
    # rmtree()'s on the bench side because check_presence() fails (the build
    # job's venv binaries point at filesystem paths that don't exist on the
    # L40 host). The bench job re-stages from `_wheels/` AFTER asv setup
    # creates a working env, sidestepping the rmtree.
    - mkdir -p _wheels
    - cp -r asv/env/*/asv-build-cache/* _wheels/
    - ls -la _wheels/
  artifacts:
    paths:
      - _wheels/
    expire_in: 1 week

# Shared config for the parallel asv bench jobs below. The two derivative
# jobs differ only in their `--bench` filter regex and `--machine` name (set
# via per-job ASV_BENCH_FILTER / ASV_MACHINE_NAME) and their `rules:` block.
# Everything else -- L40 booking, env setup, wheel-cache restage from the
# `linux-x86_64 asv build` artifact, asv invocation -- is identical.
.linux-x86_64-asv-bench-base:
  stage: test
  needs: ["linux-x86_64 asv build"]
  timeout: 8h
  tags:
    - omni-perf-only/linux
    - instance/gitlab-gtl-performance
  variables:
    MACHINE_OS: ubuntu22-04-5
    MACHINE_KIND: "EPYC_9124P_1XL40_ADA"
    MACHINE_DRIVER: "NVIDIA-Linux-x86_64-580.126.09"
    PROJECT_CATEGORY: "Warp"
    GIT_DEPTH: "50"
  before_script:
    - !reference [.snippets, section-start-install-deps]
    - df -h
    - nvidia-smi
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv python install $UV_PYTHON
    - COMPARE_REF="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}}"
    - 'echo "COMPARE_REF value: ${COMPARE_REF}"'
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git fetch origin $COMPARE_REF
    - git checkout -f $COMPARE_REF
    - git checkout -f $CI_COMMIT_SHA
    - !reference [.snippets, section-end-install-deps]
  script:
    - uvx asv machine --machine "$ASV_MACHINE_NAME" --yes
    # Create a working asv env first (no project build), so subsequent
    # `asv continuous` calls find a consistent env and don't rmtree it.
    # `asv setup` always exits non-zero because asv/main.py does
    # `sys.exit(result)` and setup's `run()` returns a list of Virtualenv
    # objects -- sys.exit([list]) prints the list and returns 1. Ignore
    # that exit code and verify the env directory was actually created.
    - uvx asv setup -v || true
    - test -d asv/env || (echo "asv setup did not create asv/env"; exit 1)
    # Restage prebuilt wheels from the build job's `_wheels/` artifact into
    # asv's build cache. asv's BuildCache.get_cache_dir requires
    # `<commit>/<wheel>.whl` to exist AND a sibling `<commit>.timestamp`
    # file; both come over from the build job's artifact intact.
    - ENV_HASH=$(ls asv/env)
    - 'test -n "$ENV_HASH" -a "$(echo "$ENV_HASH" | wc -l)" -eq 1 || { echo "expected exactly one env under asv/env/, got: $ENV_HASH"; exit 1; }'
    - 'echo "asv env hash: $ENV_HASH"'
    - mkdir -p asv/env/$ENV_HASH/asv-build-cache
    - cp -r _wheels/* asv/env/$ENV_HASH/asv-build-cache/
    - ls -la asv/env/$ENV_HASH/asv-build-cache/
    - 'date -u +"asv continuous start: %FT%TZ"'
    - uvx asv continuous -v -e --interleave-rounds --append-samples --no-only-changed -f 1.10 --bench "$ASV_BENCH_FILTER" $COMPARE_REF $CI_COMMIT_SHA 2>&1 || (uvx asv compare -v --split $COMPARE_REF $CI_COMMIT_SHA 2>&1 && exit 2)
    - 'date -u +"asv continuous end:   %FT%TZ"'
  artifacts:
    paths:
      - asv/results/
    expire_in: 1 week
    when: always

# Non-tile asv benchmarks. Runs whenever this child pipeline is triggered;
# the parent's `asv benchmarks` job is what gates ASV on path changes.
linux-x86_64 asv non-tile:
  extends: .linux-x86_64-asv-bench-base
  variables:
    ASV_MACHINE_NAME: asv-bench-non-tile
    ASV_BENCH_FILTER: '^(?!tile\.)'

# Tile asv benchmarks. Heavier than the rest combined, so auto-runs only on
# tile-relevant changes; available as a manual play button otherwise for
# contributors whose change touches tile perf in ways the path filter
# doesn't catch (e.g. codegen tweaks, Newton-side changes).
linux-x86_64 asv tile:
  extends: .linux-x86_64-asv-bench-base
  variables:
    ASV_MACHINE_NAME: asv-bench-tile
    ASV_BENCH_FILTER: '^tile\.'
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
      changes:
        compare_to: "refs/heads/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        paths:
          - .gitlab/ci/asv.yml
          - asv.conf.json
          - asv/benchmarks/tile/**/*
          - warp/native/tile*
          - warp/native/tile/**/*
          # libmathdx (cublasdx etc.) is pulled in by tile.compile_*  and
          # tile.gemm benchmarks at LTO time; bumping its pin in the deps
          # config is exactly the kind of change the tile bench is here to
          # catch regressions on.
          - deps/libmathdx-deps.packman.xml
    - when: manual
      allow_failure: true
