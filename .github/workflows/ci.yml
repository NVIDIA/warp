name: CI

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
  workflow_dispatch:
  push:
    tags:
      - v*
    branches:
      - main
      - release-*
  schedule: # Schedule workflow only runs on the default branch
    - cron: "45 9 * * *"

env:
  PYTHONFAULTHANDLER: "1" # Dump tracebacks on fatal signals (SIGSEGV, SIGABRT, etc.)

jobs:
  build-warp:
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/warp'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # CUDA 12.x and CUDA 13.0 reject the VS 2026 image.
          - os: windows-2022
            platform: windows
            cuda-version: "12.9.1"
            artifact-name: build-artifact-windows-cuda12
            cuda-sub-packages: '["cudart", "nvcc", "nvrtc_dev", "nvjitlink"]'
            cuda-non-cuda-packages: ''
          - os: windows-2022
            platform: windows
            cuda-version: "13.0.2"
            artifact-name: build-artifact-windows-cuda13
            cuda-sub-packages: '["cudart", "crt", "nvcc", "nvrtc_dev", "nvjitlink", "nvvm", "nvptxcompiler"]'
            cuda-non-cuda-packages: ''
          - os: ubuntu-24.04
            platform: ubuntu-x86_64
            cuda-version: "12.9.1"
            artifact-name: build-artifact-ubuntu-x86_64-cuda12
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
          - os: ubuntu-24.04
            platform: ubuntu-x86_64
            cuda-version: "13.0.2"
            artifact-name: build-artifact-ubuntu-x86_64-cuda13
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
          - os: ubuntu-24.04-arm
            platform: ubuntu-aarch64
            cuda-version: "12.9.1"
            artifact-name: build-artifact-ubuntu-aarch64-cuda12
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
          - os: ubuntu-24.04-arm
            platform: ubuntu-aarch64
            cuda-version: "13.0.2"
            artifact-name: build-artifact-ubuntu-aarch64-cuda13
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
          - os: macos-latest
            platform: macos
            cuda-version: ''
            artifact-name: build-artifact-macos
            cuda-sub-packages: ''
            cuda-non-cuda-packages: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true
      
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"
      
      - name: Set up Python
        run: uv python install
      
      - name: Cache build artifacts
        if: matrix.platform != 'macos'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        id: cache-build
        with:
          path: warp/bin/
          # Hash only native-binary inputs. VERSION.md changes flow through
          # generated warp/native/version.h, which is covered by native headers.
          key: build-${{ matrix.artifact-name }}-${{ matrix.cuda-version }}-${{ hashFiles('build_lib.py', 'build_llvm.py', 'warp/_src/build_dll.py', 'warp/native/**/*.cpp', 'warp/native/**/*.cu', 'warp/native/**/*.cuh', 'warp/native/**/*.h', 'warp/native/libdevice/*.bc', 'warp/native/warp.map', 'deps/libmathdx-deps.packman.xml') }}
      
      - name: Install CTK (with non-CUDA packages)
        if: steps.cache-build.outputs.cache-hit != 'true' && matrix.cuda-sub-packages != '' && matrix.cuda-non-cuda-packages != ''
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: ${{ matrix.cuda-version }}
          sub-packages: ${{ matrix.cuda-sub-packages }}
          non-cuda-sub-packages: ${{ matrix.cuda-non-cuda-packages }}
          method: 'network'
      
      - name: Install CTK (without non-CUDA packages)
        if: steps.cache-build.outputs.cache-hit != 'true' && matrix.cuda-sub-packages != '' && matrix.cuda-non-cuda-packages == ''
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: ${{ matrix.cuda-version }}
          sub-packages: ${{ matrix.cuda-sub-packages }}
          method: 'network'
      
      - name: Build Warp
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: uv run build_lib.py
      
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: warp/bin/
          retention-days: ${{ github.repository == 'NVIDIA/warp' && 7 || 1 }}
      

  build-warp-python-free-threaded:
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/warp'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.14t

      - name: Cache build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        id: cache-build
        with:
          path: warp/bin/
          # Hash only native-binary inputs. VERSION.md changes flow through
          # generated warp/native/version.h, which is covered by native headers.
          key: build-ubuntu-x86_64-cuda13-python314t-13.0.2-${{ hashFiles('build_lib.py', 'build_llvm.py', 'warp/_src/build_dll.py', 'warp/native/**/*.cpp', 'warp/native/**/*.cu', 'warp/native/**/*.cuh', 'warp/native/**/*.h', 'warp/native/libdevice/*.bc', 'warp/native/warp.map', 'deps/libmathdx-deps.packman.xml') }}

      - name: Install CTK
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: "13.0.2"
          sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libnvjitlink-dev"]'
          method: 'network'

      - name: Build Warp
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: uv run --python 3.14t build_lib.py

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifact-ubuntu-x86_64-cuda13-python314t
          path: warp/bin/
          retention-days: ${{ github.repository == 'NVIDIA/warp' && 7 || 1 }}


  build-warp-cmake:
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/warp'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # CUDA 12.x and CUDA 13.0 reject the VS 2026 image.
          - os: windows-2022
            platform: windows
            cuda-version: "13.0.2"
            cuda-sub-packages: '["cudart", "crt", "nvcc", "nvrtc_dev", "nvjitlink", "nvvm", "nvptxcompiler"]'
            cuda-non-cuda-packages: ''
            warp-cache-path-suffix: '\warp-cache-cmake'
          - os: ubuntu-24.04
            platform: ubuntu-x86_64
            cuda-version: "13.0.2"
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
            warp-cache-path-suffix: /warp-cache-cmake
          - os: ubuntu-24.04-arm
            platform: ubuntu-aarch64
            cuda-version: "13.0.2"
            cuda-sub-packages: '["cudart-dev", "nvcc", "nvrtc-dev"]'
            cuda-non-cuda-packages: '["libnvjitlink-dev"]'
            warp-cache-path-suffix: /warp-cache-cmake
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install

      - name: Install CTK (with non-CUDA packages)
        if: matrix.cuda-sub-packages != '' && matrix.cuda-non-cuda-packages != ''
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: ${{ matrix.cuda-version }}
          sub-packages: ${{ matrix.cuda-sub-packages }}
          non-cuda-sub-packages: ${{ matrix.cuda-non-cuda-packages }}
          method: 'network'

      - name: Install CTK (without non-CUDA packages)
        if: matrix.cuda-sub-packages != '' && matrix.cuda-non-cuda-packages == ''
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: ${{ matrix.cuda-version }}
          sub-packages: ${{ matrix.cuda-sub-packages }}
          method: 'network'

      - name: Print build tool versions
        run: |
          cmake --version
          ninja --version

      - name: Prepare Python environment for CMake codegen
        run: uv sync --no-install-project

      - name: Set up MSVC developer environment
        if: matrix.platform == 'windows'
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $vsDevCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          if (!(Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat was not found"
          }

          $before = @{}
          Get-ChildItem Env: | ForEach-Object { $before[$_.Name] = $_.Value }
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 > nul && set" |
            ForEach-Object {
              $name, $value = $_ -split '=', 2
              if ($name -and $before[$name] -ne $value) {
                "$name=$value" >> $env:GITHUB_ENV
              }
            }

      - name: Build Warp with CMake
        if: matrix.platform != 'windows'
        env:
          WARP_CACHE_PATH: ${{ runner.temp }}${{ matrix.warp-cache-path-suffix }}
        run: |
          cuda_path="${CUDA_HOME:-${CUDA_PATH:-}}"
          if [ -z "$cuda_path" ]; then
            echo "CUDA_HOME or CUDA_PATH must be set" >&2
            exit 1
          fi
          cmake -S . -B _build/cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DWARP_CUDA_PATH:PATH="$cuda_path"
          cmake --build _build/cmake --parallel

      - name: Build Warp with CMake
        if: matrix.platform == 'windows'
        env:
          WARP_CACHE_PATH: ${{ runner.temp }}${{ matrix.warp-cache-path-suffix }}
        run: |
          if (!$env:CUDA_PATH) {
            throw "CUDA_PATH must be set"
          }
          cmake -S . -B _build/cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            "-DWARP_CUDA_PATH:PATH=$env:CUDA_PATH"
          cmake --build _build/cmake --parallel

      - name: Verify Warp diagnostics
        env:
          WARP_CACHE_PATH: ${{ runner.temp }}${{ matrix.warp-cache-path-suffix }}
        run: |
          uv run python -c "import warp; info = warp.print_diagnostics(); assert not info['warp_native'].startswith('unknown'); assert not info['warp_clang'].startswith('unknown')"


  test-warp-cpu:
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/warp'
    runs-on: ${{ matrix.os }}
    needs: build-warp
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: windows
            artifact-name: build-artifact-windows-cuda12
          - os: ubuntu-24.04
            platform: ubuntu-x86_64
            artifact-name: build-artifact-ubuntu-x86_64-cuda13
          - os: ubuntu-24.04-arm
            platform: ubuntu-aarch64
            artifact-name: build-artifact-ubuntu-aarch64-cuda13
          - os: macos-latest
            platform: macos
            artifact-name: build-artifact-macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true
      
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"
      
      - name: Set up Python
        run: uv python install
      
      - name: Download Warp build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: warp/bin/
      
      - name: Run Tests
        run: uv run --extra dev -m warp.tests --junit-report-xml rspec.xml -s autodetect
      
      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        with:
          paths: "rspec.xml"
          show: "fail"
        if: always()

  test-warp-debug:
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/warp'
    runs-on: ubuntu-24.04
    needs: build-warp
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true
      
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"
      
      - name: Set up Python
        run: uv python install
      
      - name: Download Warp build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-ubuntu-x86_64-cuda13
          path: warp/bin/
      
      - name: Run Debug Mode Tests (CPU)
        run: uv run --extra dev -m warp.tests --junit-report-xml rspec.xml --suite debug --warp-debug --failfast
      
      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        with:
          paths: "rspec.xml"
          show: "fail"
        if: always()

  # Compute whether the changes on a pull-request/* branch touch files relevant
  # to GPU testing or to doctest. Always runs (cheap). Downstream jobs read the
  # outputs to decide whether to run on PR branches; non-PR events (schedule,
  # workflow_dispatch, push to main / release-* / tag) bypass these outputs via
  # the dependent jobs' own `if:` blocks.
  gpu-changes:
    if: github.repository == 'NVIDIA/warp'
    runs-on: ubuntu-latest
    # Stay green for dependents on failure; combined with the `|| 'true'` fallback
    # on the outputs below, this keeps PR-style branches from silently skipping
    # GPU testing or doctest when the filter has a transient error.
    continue-on-error: true
    permissions:
      contents: read
    outputs:
      gpu_relevant: ${{ steps.filter-gpu.outputs.any_changed || 'true' }}
      docs_relevant: ${{ steps.filter-docs.outputs.any_changed || 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch main for diff base
        run: git fetch --depth=1 origin main

      - name: Detect GPU-relevant changes
        id: filter-gpu
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad  # v47.0.5
        with:
          base_sha: origin/main
          files: |
            .github/workflows/ci.yml
            .python-version
            warp/**
            pyproject.toml
            tools/**
            deps/*
            build_lib.py
            build_llvm.py
            uv.lock

      - name: Detect doctest-relevant changes
        id: filter-docs
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad  # v47.0.5
        with:
          base_sha: origin/main
          files: docs/**

  test-warp-gpu-linux:
    runs-on: ${{ matrix.runner-label }}
    needs: [build-warp, gpu-changes]
    if: |
      github.repository == 'NVIDIA/warp' && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release-') ||
        needs.gpu-changes.outputs.gpu_relevant == 'true'
      )
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner-label: linux-amd64-gpu-h100-latest-1
            gpu-name: h100
            artifact-name: build-artifact-ubuntu-x86_64-cuda13
            torch-extra: torch-cu13
            jax-extra: jax[cuda13]
            rmm-args: ""
          - runner-label: linux-amd64-gpu-rtxpro6000-latest-1
            gpu-name: rtxpro6000
            artifact-name: build-artifact-ubuntu-x86_64-cuda13
            torch-extra: torch-cu13
            jax-extra: jax[cuda13]
            rmm-args: ""
          - runner-label: linux-amd64-gpu-l4-earliest-1
            gpu-name: l4
            artifact-name: build-artifact-ubuntu-x86_64-cuda12
            torch-extra: torch-cu12
            jax-extra: jax[cuda12]
            rmm-args: --with rmm-cu12
    container:
      image: ubuntu:24.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 45
    steps:
      - name: Display GPU information
        run: nvidia-smi

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        # curl and gpg are required by codecov/codecov-action@v6 to download and verify the uploader.
        run: |
          apt-get update
          apt-get install -y git git-lfs curl gpg
          git lfs install

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install

      - name: Download Warp build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: warp/bin/

      - name: Run Tests
        run: uv run --extra dev --extra ${{ matrix.torch-extra }} --with "${{ matrix.jax-extra }}" ${{ matrix.rmm-args }} -m warp.tests --junit-report-xml rspec.xml --coverage --coverage-xml coverage.xml -s autodetect

      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        with:
          paths: "rspec.xml"
          show: "fail"
        if: always()

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        continue-on-error: true  # codecov upload is best-effort; do not fail the job on upload errors.
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          disable_search: true
          files: ./rspec.xml
          report_type: test_results
          flags: test-warp-gpu-linux-${{ matrix.gpu-name }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        continue-on-error: true  # codecov upload is best-effort; do not fail the job on upload errors.
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          disable_search: true
          files: ./coverage.xml
          flags: test-warp-gpu-linux-${{ matrix.gpu-name }}
          token: ${{ secrets.CODECOV_TOKEN }}

  test-warp-gpu-linux-gb300:
    # GB300 capacity is intentionally limited to one scheduled nightly job.
    if: github.repository == 'NVIDIA/warp' && github.event_name == 'schedule'
    runs-on: linux-arm64-gpu-gb300-latest-1
    needs: [build-warp]
    permissions:
      contents: read
    container:
      image: ubuntu:24.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 45
    steps:
      - name: Display GPU information
        run: nvidia-smi

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        # curl and gpg are required by codecov/codecov-action@v6 to download and verify the uploader.
        run: |
          apt-get update
          apt-get install -y git git-lfs curl gpg
          git lfs install

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install

      - name: Download Warp build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-ubuntu-aarch64-cuda13
          path: warp/bin/

      - name: Run Tests
        run: uv run --extra dev --with "jax[cuda13]" -m warp.tests --junit-report-xml rspec.xml --coverage --coverage-xml coverage.xml -s autodetect

