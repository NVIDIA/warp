      )
    permissions:
      contents: read
    container:
      image: ubuntu:24.04
      options: -u root --security-opt seccomp=unconfined --shm-size 16g
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    timeout-minutes: 45
    steps:
      - name: Display GPU information
        run: nvidia-smi

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git git-lfs curl gpg build-essential
          git lfs install

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.14t

      - name: Download Warp build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-ubuntu-x86_64-cuda13-python314t
          path: warp/bin/

      # usd-core wheels use ABI tag "none" but are built against the regular
      # (GIL) CPython ABI, so importing pxr on a free-threaded interpreter
      # segfaults. Keep usd-core out of this environment.
      - name: Install Python dependencies
        run: uv sync --python 3.14t --extra dev --no-install-package usd-core

      - name: Run Tests
        run: uv run --python 3.14t --no-sync -m warp.tests --junit-report-xml rspec.xml -s autodetect --failfast

      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        with:
          paths: "rspec.xml"
          show: "fail"
        if: always()

